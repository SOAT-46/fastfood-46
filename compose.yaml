services:
  server:
    container_name: api
    build:
      context: .
    env_file:
      - .env
    ports:
      - "${APP_PORT}:${APP_PORT}"
    networks:
      - application-network
    depends_on:
      - db
  db:
    container_name: postgres
    image: postgres:17.0-alpine3.20
    restart: always
    volumes:
      - db-data:/var/lib/postgresql/data
    env_file:
      - .env
    ports:
      - "${POSTGRES_PORT}:${POSTGRES_PORT}"
    networks:
      - application-network

volumes:
  db-data:

networks:
  application-network:
