services:
  server:
    container_name: api
    build:
      context: .
    env_file:
      - .env
    ports:
      - "${APP_PORT}:${APP_PORT}"
    networks:
      - application-network
    depends_on:
      fastfood_database:
        condition: service_healthy
  fastfood_database:
    container_name: fastfood_database
    image: postgres:17.0-alpine3.20
    restart: always
    volumes:
      - db-data:/var/lib/postgresql/data
    env_file:
      - .env
    ports:
      - "${POSTGRES_PORT}:${POSTGRES_PORT}"
    networks:
      - application-network
    healthcheck:
      test: ["CMD", "pg_isready"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  db-data:

networks:
  application-network:
